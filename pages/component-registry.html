<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Component Registry — SW Design System</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/tokens.css">
  <style>
    .registry-error-box { background:#fff5f5;border:1px solid #fecaca;border-radius:12px;padding:24px;margin:24px 0; }
    .registry-error-title { font-weight:700;color:#dc2626;margin-bottom:8px; }
    .registry-error-msg { font-family:monospace;font-size:13px;color:#374151;margin-bottom:8px; }
    .registry-error-hint { font-size:12px;color:#6b7280; }
    .registry-error-hint code { background:#f3f4f6;padding:2px 6px;border-radius:4px; }
    .registry-badge { display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600; }
    .badge-stable { background:#d1fae5;color:#065f46; }
    .badge-candidate { background:#fef3c7;color:#92400e; }
    .badge-planned { background:#e0e7ff;color:#3730a3; }
    .badge-wip { background:#e0f2fe;color:#0c4a6e; }
    .badge-notstarted { background:#f3f4f6;color:#6b7280; }
    .badge-deprecated { background:#fee2e2;color:#991b1b; }
    .badge-unknown { background:#f3f4f6;color:#6b7280; }

    .registry-source-banner { display:flex;align-items:center;gap:8px;padding:10px 16px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;margin-bottom:28px;font-size:12px;color:#1e40af; }
    .registry-source-banner code { background:#dbeafe;padding:1px 6px;border-radius:4px;font-size:11px; }

    .component-registry-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px; }
    .component-registry-card { background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:20px;transition:box-shadow 0.15s; }
    .component-registry-card:hover { box-shadow:0 4px 16px rgba(0,0,0,0.07); }

    .comp-card-header { display:flex;align-items:center;justify-content:space-between;margin-bottom:8px; }
    .comp-card-name { font-size:16px;font-weight:700;color:#111827; }
    .comp-card-category { font-size:11px;color:#6b7280;background:#f3f4f6;padding:2px 8px;border-radius:12px; }
    .comp-card-desc { font-size:13px;color:#6b7280;margin-bottom:14px;line-height:1.5; }

    .comp-card-status-grid { display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px; }
    .comp-status-item { display:flex;flex-direction:column;gap:4px;align-items:center;background:#f9fafb;border-radius:8px;padding:8px 4px; }
    .comp-status-label { font-size:10px;font-weight:600;color:#9ca3af;text-transform:uppercase;letter-spacing:0.04em; }

    .comp-card-variants { font-size:11px;color:#6b7280;margin-bottom:8px; }

    .comp-card-notes { margin-top:8px; }
    .comp-card-notes summary { font-size:12px;color:#9ca3af;cursor:pointer;user-select:none; }
    .comp-card-notes summary:hover { color:#374151; }
    .comp-card-notes ul { list-style:none;padding:8px 0 0;margin:0; }
    .comp-card-notes li { font-size:11px;color:#713f12;background:#fffbeb;padding:5px 10px;border-radius:6px;margin-bottom:4px; }

    .comp-detail { background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:24px;margin-bottom:24px; }
    .comp-detail h2 { font-size:20px;font-weight:700;color:#111827;margin-bottom:4px; }
    .comp-detail h2 small { font-size:12px;font-weight:400;color:#9ca3af;margin-left:8px; }
    .comp-detail-meta { display:flex;flex-wrap:wrap;gap:12px;margin-bottom:20px; }
    .comp-variant-block { margin-bottom:20px;padding:16px;background:#f9fafb;border-radius:10px; }
    .comp-variant-block h4 { display:flex;align-items:center;gap:6px;flex-wrap:wrap;font-size:13px;font-weight:600;color:#374151;margin-bottom:10px; }
    .comp-token-list { list-style:none;padding:0;margin:0;display:flex;flex-wrap:wrap;gap:6px; }
    .comp-token-list li code { font-family:monospace;font-size:10px;background:#fff;border:1px solid #e5e7eb;padding:2px 7px;border-radius:4px;color:#1d4ed8; }
    .comp-issues { list-style:none;padding:0;margin:6px 0 0; }
    .comp-issues li { font-size:11px;color:#d97706;background:#fffbeb;padding:4px 10px;border-radius:6px;margin-bottom:4px; }
  </style>
</head>
<body>
<div class="layout">
  <aside class="sidebar"><div id="sidebar-inner"></div></aside>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <main class="main-content">
    <div class="mobile-header">
      <button class="hamburger" id="sidebar-toggle" aria-label="메뉴">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <span class="mobile-logo">SW Design System</span>
    </div>

    <div class="page-header">
      <h1 class="page-title">Component Registry</h1>
      <p class="page-desc">Core Component 등록 현황 — tokenStatus / codeStatus / darkModeStatus</p>
    </div>

    <div class="page-content">
      <div class="registry-source-banner">
        <span>📦 Source:</span>
        <code>registry/components/*.json</code>
        <span style="margin-left:auto;opacity:0.7">10개 컴포넌트</span>
      </div>

      <div id="app"><div style="padding:40px;color:#9ca3af;text-align:center">Registry 로드 중...</div></div>
    </div>
  </main>
</div>

<script src="../assets/js/registry-loader.js"></script>
<script src="../assets/js/component-renderer.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', async () => {
    const app = document.getElementById('app');

    const { data: index, error: indexErr } = await loadRegistryIndex();
    if (indexErr) { renderError(app, indexErr); return; }

    const componentsMap = await loadAllComponents(index);
    renderComponentList(app, componentsMap);
  });
</script>
<script src="../assets/js/main.js"></script>
</body>
</html>
