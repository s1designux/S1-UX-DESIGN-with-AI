<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <script>!function(){var z=localStorage.getItem("sw-ds-zoom");if(z)document.documentElement.style.zoom=z+"%"}();</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patterns · S1 UX DESIGN GUIDE</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/tokens.css">
  <style>
        /* [layout-gate] 전폭 — 화면 폭에 맞춰 컨텐츠 확장 (자동관리: npm run layout:check -- --fix) */
    .page-content { max-width: none; }
    .page-header-inner { max-width: none; }

    .page-header { position: static !important; border-bottom: none; padding-bottom: 16px; }
    .page-content { padding-top: 20px; }

    /* Empty state — 아직 등록된 패턴 없음 (모달 잔재 철거 후 빈터) */
    .pattern-empty {
      margin-top: 40px;
      padding: 56px 32px;
      border: 1px dashed var(--color-border-default);
      border-radius: 12px;
      background: var(--color-bg-subtle);
      text-align: center;
    }
    .pattern-empty-title {
      font-size: 15px; font-weight: 700;
      color: var(--color-text-secondary);
      margin: 0 0 8px;
    }
    .pattern-empty-desc {
      font-size: 13px; line-height: 1.7;
      color: var(--color-text-tertiary);
      margin: 0;
    }
  </style>
</head>
<body>

<div class="mobile-header">
  <button class="hamburger" id="sidebar-toggle" aria-label="메뉴 열기">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  </button>
  <span class="mobile-logo">S1 UX DESIGN GUIDE</span>
</div>
<div class="sidebar-overlay" id="sidebar-overlay"></div>

<div class="app">
  <aside class="sidebar" id="sidebar"></aside>

  <main class="main-content">
    <!-- 제목 영역: 스크롤 시 사라짐 -->
    <div class="page-header">
      <div class="page-header-inner">
        <div class="page-header-text">
          <h1>Patterns</h1>
          <p>Core 컴포넌트(s1-btn · s1-table 등)를 조합한 반복 레이아웃 패턴. 신규 보여주기 컴포넌트를 만들지 않고 코어를 배치·조합한다.</p>
        </div>
        <div class="page-header-actions">
          <span class="badge badge-blue">v0.2</span>
        </div>
      </div>
    </div><!-- /page-header -->

    <div class="page-content">

      <!-- 아직 등록된 패턴 없음 — 신규 패턴 추가 시 이 자리에 comp-section 을 넣는다 -->
      <div class="pattern-empty">
        <p class="pattern-empty-title">아직 등록된 패턴이 없습니다</p>
        <p class="pattern-empty-desc">신규 패턴이 편입되면 이 페이지에 추가됩니다.<br>(모달 레거시 잔재 철거 완료 — 신규 편입 전 빈터 상태)</p>
      </div>

    </div><!-- /page-content -->
  </main>
</div>

<script src="../assets/js/main.js"></script>
</body>
</html>
