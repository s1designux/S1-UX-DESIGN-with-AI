<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <script>!function(){var z=localStorage.getItem("sw-ds-zoom");if(z)document.documentElement.style.zoom=z+"%"}();</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Component Tokens (Registry) — S1 UX DESIGN GUIDE</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/tokens.css">
  <style>
    .registry-error-box { background:#fff5f5;border:1px solid #fecaca;border-radius:12px;padding:24px;margin:24px 0; }
    .registry-error-title { font-weight:700;color:#dc2626;margin-bottom:8px; }
    .registry-error-msg { font-family:monospace;font-size:13px;color:#374151;margin-bottom:8px; }
    .registry-error-hint { font-size:12px;color:#6b7280; }
    .registry-error-hint code { background:#f3f4f6;padding:2px 6px;border-radius:4px; }
    .registry-badge { display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600; }
    .badge-stable { background:#d1fae5;color:#065f46; }
    .badge-candidate { background:#fef3c7;color:#92400e; }
    .badge-planned { background:#e0e7ff;color:#3730a3; }
    .badge-unknown { background:#f3f4f6;color:#6b7280; }

    .registry-source-banner { display:flex;align-items:center;gap:8px;padding:10px 16px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;margin-bottom:28px;font-size:12px;color:#1e40af; }
    .registry-source-banner code { background:#dbeafe;padding:1px 6px;border-radius:4px;font-size:11px; }

    .registry-group { margin-bottom: 48px; }
    .registry-group-title { font-size:15px;font-weight:700;color:#111827;margin-bottom:16px;padding-bottom:8px;border-bottom:2px solid #e5e7eb;text-transform:capitalize; }
    .registry-variant-title { font-size:13px;font-weight:600;color:#374151;margin:20px 0 8px;padding-left:4px; }

    .ct-token-table { border:1px solid #e5e7eb;border-radius:12px;overflow:hidden;margin-bottom:12px; }
    .ct-table-head, .ct-token-row {
      display: grid; grid-template-columns: 1fr 1fr 90px;
      gap: 8px; padding: 9px 14px; align-items: center;
    }
    .ct-table-head { background:#f9fafb;font-size:11px;font-weight:600;color:#6b7280;border-bottom:1px solid #e5e7eb; }
    .ct-token-row { border-top:1px solid #f3f4f6; }
    .ct-token-row:hover { background:#f9fafb; }
    .ct-token-var .copy-token { font-family:monospace;font-size:11px;color:#1d4ed8;font-weight:600;cursor:pointer; }
    .ct-token-var .copy-token:hover { text-decoration:underline; }
    .ct-token-val { display:flex;align-items:center;gap:6px; }
    .ct-token-val code { font-family:monospace;font-size:10.5px;color:#374151;word-break:break-all; }
    .color-chip { display:inline-block;width:16px;height:16px;border-radius:4px;border:1px solid rgba(0,0,0,0.1);flex-shrink:0; }

    .page-section-nav { display:flex;flex-wrap:wrap;gap:8px;margin-bottom:32px; }
    .page-section-nav a { padding:6px 14px;background:#f3f4f6;border-radius:20px;font-size:12px;font-weight:500;color:#374151;text-decoration:none; }
    .page-section-nav a:hover { background:#e0e7ff;color:#3730a3; }
  </style>
</head>
<body>
<div class="layout">
  <aside class="sidebar"><div id="sidebar-inner"></div></aside>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <main class="main-content">
    <div class="mobile-header">
      <button class="hamburger" id="sidebar-toggle" aria-label="메뉴">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <span class="mobile-logo">S1 UX DESIGN GUIDE</span>
    </div>

    <div class="page-header">
      <h1 class="page-title">Component Tokens</h1>
      <p class="page-desc">컴포넌트 전용 토큰 — registry/tokens/component.tokens.json 기반</p>
      <nav class="page-section-nav" id="section-nav"></nav>
    </div>

    <div class="page-content">
      <div style="background:#fffbeb;border:1.5px solid #f59e0b;border-radius:10px;padding:12px 18px;margin-bottom:20px;display:flex;gap:10px;align-items:center;font-size:13px;">
        <span style="font-size:16px;flex-shrink:0">📦</span>
        <span style="color:#92400e;">이 페이지는 <strong>Harness Admin &gt; Registry Explorer</strong>로 통합되었습니다.</span>
        <a href="registry-explorer.html" style="margin-left:auto;background:#f59e0b;color:#fff;padding:5px 14px;border-radius:6px;font-size:12px;font-weight:600;text-decoration:none;flex-shrink:0;">Registry Explorer →</a>
      </div>
      <div class="registry-source-banner">
        <span>📦 Source:</span>
        <code>registry/tokens/component.tokens.json</code>
        <span style="margin-left:auto;opacity:0.7">S1 UX DESIGN GUIDE V2.4</span>
      </div>

      <div id="app"><div style="padding:40px;color:#9ca3af;text-align:center">Registry 로드 중...</div></div>
    </div>
  </main>
</div>

<script src="../assets/js/registry-data-bundle.js"></script>
<script src="../assets/js/registry-loader.js"></script>
<script src="../assets/js/token-renderer.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', async () => {
    const app = document.getElementById('app');
    const nav = document.getElementById('section-nav');

    const { data: index, error: indexErr } = await loadRegistryIndex();
    if (indexErr) { renderError(app, indexErr); return; }

    const { data, error } = await loadJson(index.tokens.component);
    if (error) { renderError(app, error); return; }

    const comps = Object.keys(data.tokens || {});
    nav.innerHTML = comps.map(c =>
      `<a href="#ct-${c}">${c.charAt(0).toUpperCase() + c.slice(1)}</a>`
    ).join('');

    renderComponentTokens(app, data);
  });
</script>
<script src="../assets/js/main.js"></script>
</body>
</html>
