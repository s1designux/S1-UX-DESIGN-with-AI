<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <script>!function(){var z=localStorage.getItem("sw-ds-zoom");if(z)document.documentElement.style.zoom=z+"%"}();</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reports — S1 UX DESIGN GUIDE</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/tokens.css">
  <style>
    .report-filter-bar { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:24px; }
    .report-chip {
      padding:5px 14px; border-radius:20px; border:1px solid #e5e7eb;
      background:#fff; font-size:12px; font-weight:500; cursor:pointer; color:#374151;
      transition:all .15s;
    }
    .report-chip.active { background:#111827; color:#fff; border-color:#111827; }
    .report-chip:hover:not(.active) { background:#f3f4f6; }

    .report-section { margin-bottom:36px; }
    .report-section-title {
      font-size:13px; font-weight:700; color:#6b7280; text-transform:uppercase;
      letter-spacing:.06em; margin-bottom:6px; padding-bottom:8px;
      border-bottom:1px solid #e5e7eb;
    }
    .report-section-desc {
      font-size:12px; color:#9ca3af; line-height:1.6;
      margin-bottom:14px;
    }
    .report-grid {
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
      gap:10px;
    }
    .report-card {
      background:#fff; border:1px solid #e5e7eb; border-radius:12px;
      padding:16px 18px; text-decoration:none; color:inherit;
      transition:border-color .15s, box-shadow .15s;
      display:flex; flex-direction:column; gap:6px;
    }
    .report-card:hover {
      border-color:#94a3b8; box-shadow:0 2px 8px rgba(0,0,0,.06);
    }
    .report-card-header { display:flex; align-items:center; gap:8px; }
    .report-badge {
      display:inline-block; padding:2px 8px; border-radius:4px;
      font-size:10px; font-weight:700; letter-spacing:.04em; flex-shrink:0;
    }
    .badge-l     { background:#dbeafe; color:#1d4ed8; }
    .badge-t     { background:#d1fae5; color:#065f46; }
    .badge-mvp   { background:#f3e8ff; color:#6b21a8; }
    .badge-guard { background:#fef9c3; color:#713f12; }
    .badge-audit { background:#e0f2fe; color:#0c4a6e; }

    .report-title { font-size:13px; font-weight:600; color:#111827; line-height:1.4; }
    .report-desc  { font-size:12px; color:#6b7280; line-height:1.5; }
    .report-meta  { display:flex; gap:8px; align-items:center; margin-top:2px; flex-wrap:wrap; }
    .report-file  { font-size:11px; color:#9ca3af; font-family:monospace; }
    .report-size  { font-size:11px; color:#9ca3af; }
    .report-date  {
      font-size:11px; font-weight:600; color:#6b7280;
      background:#f3f4f6; padding:1px 7px; border-radius:4px;
      letter-spacing:.02em; flex-shrink:0;
    }
    .summary-bar {
      background:#f8fafc; border:1px solid #e2e8f0; border-radius:12px;
      padding:16px 20px; margin-bottom:28px;
      display:flex; gap:24px; flex-wrap:wrap; align-items:center;
    }
    .summary-stat       { text-align:center; }
    .summary-stat-num   { font-size:22px; font-weight:700; color:#111827; }
    .summary-stat-label { font-size:11px; color:#6b7280; }
    .page-content       { max-width: none; padding: 28px 32px; }
    .page-header-inner  { max-width: none; }
    .reports-loading    { color:#9ca3af; font-size:13px; }
  </style>
</head>
<body>
<div class="layout">
  <aside class="sidebar"><div id="sidebar-inner"></div></aside>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <main class="main-content">
    <div class="mobile-header">
      <button class="hamburger" id="sidebar-toggle" aria-label="메뉴">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <span class="mobile-logo">S1 UX DESIGN GUIDE</span>
    </div>

    <div class="page-header">
      <h1 class="page-title">Reports</h1>
      <p class="page-desc">디자인 시스템 작업 과정에서 만들어진 검토 결과와 의사결정 내용을 모아둔 문서 목록입니다.</p>
    </div>

    <div class="page-content">
      <!-- data/reports-index.json 기반 동적 렌더링. 수동 카드 추가 금지.      -->
      <!-- 리포트 목록 변경: npm run reports:sync 로 index 재생성 후 확인하세요. -->
      <div id="summary-bar" class="summary-bar" aria-live="polite">
        <div class="reports-loading">리포트 목록을 불러오는 중…</div>
      </div>
      <div id="filter-bar" class="report-filter-bar" role="group" aria-label="카테고리 필터"></div>
      <div id="reports-sections"></div>
    </div>
  </main>
</div>

<script>
(function () {
  'use strict';

  var SECTION_ORDER = ['legacy', 'token', 'mvp', 'guard', 'audit'];

  var SECTION_META = {
    legacy: {
      label: '화면 점검',
      title: '화면 점검 — 기존 화면/컴포넌트 구조를 확인하는 단계',
      desc:  '기존 UX Guide 2.4에서 사용하던 색상·크기 변수들을 새 디자인 시스템 구조로 이전하기 위해 조사하고 계획한 작업 기록입니다. L1(전수 조사) → L2(재분류) → L3(구조 설계) → L4(확정 계획) 순으로 진행되며, C0(컴포넌트 토큰 커버리지 점검)·F0(Figma 변수 사용 현황 조사)·L4.5(통합 검토) 단계도 포함됩니다.',
    },
    token: {
      label: '토큰 연결',
      title: '토큰 연결 — 기존 UI를 디자인 시스템 토큰 기준과 연결하는 단계',
      desc:  '디자인 툴(Figma)에서 사용하는 변수 이름과 CSS 코드에서 사용하는 변수 이름을 서로 연결한 작업 기록입니다. 어떤 Figma 변수가 어떤 CSS 변수와 같은 의미인지 정리하고, 자동 동기화 도구를 만든 내용이 포함됩니다.',
    },
    mvp: {
      label: '적용 범위',
      title: '적용 범위 — 먼저 적용할 범위와 우선순위를 정하는 단계',
      desc:  '디자인 시스템 초기 구성(MVP0)부터 버튼(MVP3), 입력창·날짜 선택기(MVP4)까지 단계별 작업 내용과 결정 사항을 기록한 로그입니다. 무엇을 만들었는지, 어떤 결정을 내렸는지 확인할 수 있습니다.',
    },
    guard: {
      label: '기준 확인',
      title: '기준 확인 — 실제 프로젝트가 디자인 가이드 기준에서 벗어나지 않는지 확인하는 단계',
      desc:  '다른 서비스(제품)의 코드가 디자인 시스템 규칙을 잘 따르고 있는지 자동으로 검사하고 수정하는 도구의 작업 기록입니다. 규칙 위반 탐지 → 수정 후보 제안 → 자동 적용 → 자동화 파이프라인 순으로 단계를 만들었습니다.',
    },
    audit: {
      label: '토큰 점검',
      title: '토큰 점검 — 토큰 사용 누락, 중복, 오류를 점검하는 단계',
      desc:  'CSS 토큰 파일, HTML 가이드 페이지, Figma 디자인 파일 간에 색상·크기 값이 모두 일치하는지 점검한 결과를 기록합니다. 값 불일치 발견 시 수정 전후 내역을 문서화하며, 자동 검사 스크립트 결과도 이 카테고리에 쌓입니다.',
    },
  };

  var BADGE_CLASS = {
    legacy: 'badge-l',
    token:  'badge-t',
    mvp:    'badge-mvp',
    guard:  'badge-guard',
    audit:  'badge-audit',
  };

  function esc(str) {
    return String(str || '')
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function renderSummaryBar(data) {
    var cats = {};
    data.reports.forEach(function (r) { cats[r.category] = (cats[r.category] || 0) + 1; });
    var stats = [
      { num: data.totalCount,          label: '총 리포트' },
      { num: Object.keys(cats).length, label: '카테고리' },
      { num: cats.legacy || 0,         label: '화면 점검' },
      { num: cats.token  || 0,         label: '토큰 연결' },
    ];
    return stats.map(function (s) {
      return '<div class="summary-stat"><div class="summary-stat-num">' + s.num +
             '</div><div class="summary-stat-label">' + s.label + '</div></div>';
    }).join('');
  }

  function renderFilterChips(presentCats) {
    var chips = [{ key: 'all', label: '전체' }];
    SECTION_ORDER.forEach(function (cat) {
      if (presentCats[cat] && SECTION_META[cat]) {
        chips.push({ key: cat, label: SECTION_META[cat].label });
      }
    });
    return chips.map(function (c, i) {
      return '<button class="report-chip' + (i === 0 ? ' active' : '') +
        '" data-cat="' + esc(c.key) + '">' + esc(c.label) + '</button>';
    }).join('');
  }

  function renderCard(r) {
    var bc   = BADGE_CLASS[r.category] || 'badge-audit';
    var size = r.fileSizeKB ? '<span class="report-size">' + r.fileSizeKB + ' KB</span>' : '';
    var desc = r.summary ? '<div class="report-desc">' + esc(r.summary) + '</div>' : '';
    return '<a href="../' + esc(r.sourcePath) + '" class="report-card" target="_blank" rel="noopener">' +
      '<div class="report-card-header">' +
        '<span class="report-badge ' + bc + '">' + esc(r.stage) + '</span>' +
        '<span class="report-title">' + esc(r.title) + '</span>' +
      '</div>' +
      desc +
      '<div class="report-meta">' +
        '<span class="report-date">' + esc(r.updatedAt || '') + '</span>' +
        '<span class="report-file">' + esc(r.filename) + '</span>' +
        size +
      '</div>' +
    '</a>';
  }

  function renderSections(data) {
    var grouped = {};
    data.reports.forEach(function (r) {
      (grouped[r.category] = grouped[r.category] || []).push(r);
    });
    return SECTION_ORDER.filter(function (cat) {
      return !!grouped[cat];
    }).map(function (cat) {
      var meta  = SECTION_META[cat] || { title: cat, desc: '' };
      var cards = grouped[cat].map(renderCard).join('');
      return '<div class="report-section" data-section="' + cat + '">' +
        '<div class="report-section-title">' + esc(meta.title) + '</div>' +
        '<div class="report-section-desc">' + esc(meta.desc) + '</div>' +
        '<div class="report-grid">' + cards + '</div>' +
      '</div>';
    }).join('');
  }

  function bindFilter() {
    var chips    = document.querySelectorAll('#filter-bar .report-chip');
    var sections = document.querySelectorAll('.report-section');
    chips.forEach(function (chip) {
      chip.addEventListener('click', function () {
        chips.forEach(function (c) { c.classList.remove('active'); });
        chip.classList.add('active');
        var cat = chip.dataset.cat;
        sections.forEach(function (s) {
          s.style.display = (cat === 'all' || s.dataset.section === cat) ? '' : 'none';
        });
      });
    });
  }

  function showError(msg) {
    document.getElementById('summary-bar').innerHTML =
      '<div style="color:#dc2626;padding:14px 18px;background:#fef2f2;border-radius:8px;' +
      'border:1px solid #fecaca;flex:1"><strong>로드 실패</strong> &mdash; ' +
      '<code>npm run reports:sync</code> 를 실행한 뒤 새로고침하세요.<br>' +
      '<code style="font-size:10px;color:#991b1b">' + esc(msg) + '</code></div>';
  }

  function render(data) {
    document.getElementById('summary-bar').innerHTML = renderSummaryBar(data);
    var presentCats = {};
    data.reports.forEach(function (r) { presentCats[r.category] = true; });
    document.getElementById('filter-bar').innerHTML = renderFilterChips(presentCats);
    document.getElementById('reports-sections').innerHTML = renderSections(data);
    bindFilter();
  }

  document.addEventListener('DOMContentLoaded', function () {
    // 1순위: reports-bundle.js 가 set 한 전역 변수 (file:// 환경, fetch 불필요)
    if (window.REPORTS_INDEX) {
      render(window.REPORTS_INDEX);
      return;
    }
    // 2순위: fetch (로컬 HTTP 서버 환경)
    fetch('../data/reports-index.json')
      .then(function (res) {
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return res.json();
      })
      .then(render)
      .catch(function (err) { showError(err.message); });
  });
}());
</script>
<!-- reports-bundle.js: reports:sync 가 자동 생성. DOMContentLoaded 전에 window.REPORTS_INDEX 를 set. -->
<script src="../assets/js/reports-bundle.js"></script>
<script src="../assets/js/main.js"></script>
</body>
</html>
