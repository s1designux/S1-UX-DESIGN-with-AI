<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <script>!function(){var z=localStorage.getItem("sw-ds-zoom");if(z)document.documentElement.style.zoom=z+"%"}();</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Token Mapping — S1 UX DESIGN GUIDE</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/tokens.css">
  <style>
    /* ── 공통 에러 박스 ── */
    .registry-error-box {
      background: #fff5f5; border: 1px solid #fecaca; border-radius: 12px;
      padding: 24px; margin: 16px 0;
    }
    .registry-error-title { font-weight: 700; color: #dc2626; margin-bottom: 8px; }
    .registry-error-msg { font-family: monospace; font-size: 13px; color: #374151; margin-bottom: 8px; }
    .registry-error-hint { font-size: 12px; color: #6b7280; }
    .registry-error-hint code { background: #f3f4f6; padding: 2px 6px; border-radius: 4px; }

    /* ── 탭 ── */
    .admin-tabs {
      display: flex; gap: 4px; background: #f3f4f6; border-radius: 12px;
      padding: 4px; margin-bottom: 24px;
    }
    .admin-tab {
      flex: 1; padding: 8px 16px; border: none; border-radius: 9px;
      font-size: 13px; font-weight: 600; color: #6b7280;
      background: transparent; cursor: pointer;
      transition: background-color .15s, color .15s;
    }
    .admin-tab.active {
      background: #fff; color: #111827; box-shadow: 0 1px 4px rgba(0,0,0,.1);
    }
    .admin-tab:hover:not(.active) { color: #111827; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── 요약 카드 ── */
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px; margin-bottom: 28px;
    }
    .summary-card {
      background: #fff; border: 1px solid #e5e7eb; border-radius: 12px;
      padding: 20px 16px; text-align: center;
    }
    .summary-card.is-green { border-color: #6ee7b7; background: #ecfdf5; }
    .summary-card.is-yellow { border-color: #fcd34d; background: #fffbeb; }
    .summary-card.is-red { border-color: #fca5a5; background: #fef2f2; }
    .summary-card.is-orange { border-color: #fdba74; background: #fff7ed; }
    .summary-card.is-blue { border-color: #93c5fd; background: #eff6ff; }
    .summary-number { font-size: 28px; font-weight: 700; color: #111827; line-height: 1; }
    .summary-label { font-size: 12px; color: #6b7280; margin-top: 4px; }

    /* ── 필터 바 ── */
    .filter-bar { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
    .filter-chip {
      padding: 4px 12px; border-radius: 20px; border: 1px solid #e5e7eb;
      background: #fff; font-size: 12px; cursor: pointer; color: #374151;
    }
    .filter-chip:hover { background: #f9fafb; }
    .filter-chip.active { background: #111827; color: #fff; border-color: #111827; }

    /* ── 배지 ── */
    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 4px;
      font-size: 11px; font-weight: 600; white-space: nowrap;
    }
    .badge-green { background: #d1fae5; color: #065f46; }
    .badge-yellow { background: #fef3c7; color: #92400e; }
    .badge-orange { background: #fed7aa; color: #9a3412; }
    .badge-red { background: #fee2e2; color: #991b1b; }
    .badge-gray { background: #f3f4f6; color: #6b7280; }
    .badge-blue { background: #dbeafe; color: #1e40af; }

    /* ── 섹션 제목 ── */
    .section-title {
      font-size: 15px; font-weight: 700; color: #111827;
      margin: 24px 0 12px; padding-bottom: 8px; border-bottom: 2px solid #e5e7eb;
    }

    /* ── 테이블 ── */
    .table-wrap {
      background: #fff; border: 1px solid #e5e7eb; border-radius: 12px;
      overflow: auto; margin-bottom: 24px;
    }
    .data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .data-table thead th {
      background: #f9fafb; padding: 10px 14px; text-align: left;
      font-size: 12px; font-weight: 600; color: #6b7280;
      border-bottom: 1px solid #e5e7eb; white-space: nowrap;
    }
    .data-table tbody td {
      padding: 10px 14px; border-bottom: 1px solid #f3f4f6;
      vertical-align: top; color: #374151;
    }
    .data-table tbody tr:last-child td { border-bottom: none; }
    .data-table tbody tr:hover { background: #f9fafb; }
    .data-table code {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12px; color: #111827; background: #f3f4f6;
      padding: 1px 6px; border-radius: 4px; white-space: nowrap;
    }
    .data-table td.muted { color: #9ca3af; font-style: italic; }
    .notes-cell { font-size: 12px; color: #6b7280; max-width: 320px; }

    .loading-msg { padding: 40px; color: #9ca3af; text-align: center; }
    .empty-msg { padding: 24px; color: #9ca3af; text-align: center; font-size: 13px; }
    /* ── 소스 / 날짜 표시 바 ── */
    .data-source-bar {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
      margin-bottom: 20px; font-size: 12px; color: #6b7280;
    }
    .data-source-file {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      background: #f3f4f6; padding: 2px 7px; border-radius: 4px;
      font-size: 11px; color: #374151;
    }
    .data-date-badge {
      background: #111827; color: #fff; padding: 2px 9px; border-radius: 4px;
      font-size: 11px; font-weight: 600; letter-spacing: .02em; flex-shrink: 0;
    }
    /* ── 전체 너비 사용 ── */
    .page-content { max-width: none; padding: 28px 32px; }
    .page-header-inner { max-width: none; }
  </style>
</head>
<body>
<div class="layout">
  <aside class="sidebar"><div id="sidebar-inner"></div></aside>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <main class="main-content">
    <div class="mobile-header">
      <button class="hamburger" id="sidebar-toggle" aria-label="메뉴">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <span class="mobile-logo">S1 UX DESIGN GUIDE</span>
    </div>

    <div class="page-header">
      <h1 class="page-title">Token Mapping</h1>
      <p class="page-desc">Figma ↔ CSS ↔ Registry 매핑 검수 화면. Figma Variable과 CSS 토큰의 의미 기반 매핑·레거시 마이그레이션·Alias·Deprecated 항목을 한 곳에서 확인한다.</p>
    </div>

    <div class="page-content">
      <div class="admin-tabs" role="tablist">
        <button class="admin-tab active" data-tab="figma-css" role="tab">Figma ↔ CSS 매핑</button>
        <button class="admin-tab" data-tab="legacy" role="tab">레거시 → 정식 토큰</button>
        <button class="admin-tab" data-tab="alias" role="tab">별칭 &amp; 사용중단</button>
      </div>

      <!-- 탭 1: Figma ↔ CSS Map -->
      <section class="tab-panel active" id="panel-figma-css" role="tabpanel">
        <div id="figma-css-content"><div class="loading-msg">매핑 데이터 로드 중...</div></div>
      </section>

      <!-- 탭 2: Legacy → Canonical Map -->
      <section class="tab-panel" id="panel-legacy" role="tabpanel">
        <div id="legacy-content"><div class="loading-msg">Legacy 매핑 로드 중...</div></div>
      </section>

      <!-- 탭 3: Alias & Deprecated -->
      <section class="tab-panel" id="panel-alias" role="tabpanel">
        <div id="alias-content"><div class="loading-msg">Alias / Deprecated 로드 중...</div></div>
      </section>
    </div>
  </main>
</div>

<script src="../assets/js/registry-data-bundle.js"></script>
<script src="../assets/js/registry-loader.js"></script>
<script>
  /* ──────────────────────────────────────────────────────────
     공통 유틸
     ────────────────────────────────────────────────────────── */
  function statusBadge(status) {
    const s = String(status || '').toLowerCase();
    if (s === 'stable' || s === 'confirmed' || s === 'mapped' || s === 'high') return 'badge-green';
    if (s === 'pending' || s === 'candidate' || s === 'medium' || s === 'foundation-candidate' || s === 'semantic-candidate' || s === 'component-candidate') return 'badge-yellow';
    if (s === 'deprecated') return 'badge-orange';
    if (s === 'needs-review' || s === 'needs-decision' || s === 'low') return 'badge-red';
    if (s === 'no-candidate' || s === 'unknown') return 'badge-gray';
    if (s === 'alias' || s === 'canonical-is-sufficient' || s === 'relocated') return 'badge-blue';
    if (s === 'removed') return 'badge-red';
    return 'badge-gray';
  }

  const STATUS_KO = {
    'stable': '확정됨', 'confirmed': '확정됨', 'mapped': '연결됨', 'high': '높음',
    'pending': '검토 중', 'candidate': '후보', 'medium': '보통',
    'foundation-candidate': '기본 레이어 후보', 'semantic-candidate': 'Semantic 후보', 'component-candidate': '컴포넌트 후보',
    'deprecated': '사용중단', 'needs-review': '검토 필요', 'needs-decision': '결정 필요', 'low': '낮음',
    'no-candidate': '후보 없음', 'unknown': '미확인',
    'alias': '별칭', 'canonical-is-sufficient': '정식 변수로 충분', 'relocated': '이동됨',
    'removed': '삭제됨', 'draft': '초안'
  };
  function statusLabel(status) {
    const s = String(status || '');
    return STATUS_KO[s.toLowerCase()] || s;
  }

  function fb(v) {
    if (v == null || v === '') return '<span class="muted">—</span>';
    return escapeHtml(String(v));
  }
  function fbDash(v, dash) {
    if (v == null || v === '') return dash || '—';
    return String(v);
  }
  function code(v) {
    if (v == null || v === '') return '<span class="muted">—</span>';
    return `<code>${escapeHtml(String(v))}</code>`;
  }

  /* ──────────────────────────────────────────────────────────
     탭 전환
     ────────────────────────────────────────────────────────── */
  document.querySelectorAll('.admin-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      const target = btn.dataset.tab;
      document.querySelectorAll('.admin-tab').forEach(b => b.classList.toggle('active', b === btn));
      document.querySelectorAll('.tab-panel').forEach(p => {
        p.classList.toggle('active', p.id === `panel-${target}`);
      });
    });
  });

  /* ──────────────────────────────────────────────────────────
     탭 1 — Figma ↔ CSS Map
     ────────────────────────────────────────────────────────── */
  async function renderFigmaCssTab() {
    const root = document.getElementById('figma-css-content');
    const { data, error } = await loadJson('registry/tokens/figma-css-token-map.json');
    if (error) { renderError(root, error); return; }

    // mappings: [{ _group, items: [...] }]
    const allItems = [];
    (data.mappings || []).forEach(group => {
      (group.items || []).forEach(item => {
        allItems.push({ ...item, _group: group._group });
      });
    });

    const counts = { all: allItems.length, stable: 0, pending: 0, 'needs-review': 0 };
    allItems.forEach(it => {
      const s = String(it.status || '').toLowerCase();
      if (s in counts) counts[s]++;
    });

    const figmaDate = (data.meta && (data.meta.updatedAt || data.meta.createdAt) || '').slice(0, 10);
    root.innerHTML = `
      <div class="data-source-bar">
        <span>소스:</span>
        <code class="data-source-file">registry/tokens/figma-css-token-map.json</code>
        ${figmaDate ? `<span class="data-date-badge">최종 업데이트: ${figmaDate}</span>` : ''}
      </div>
      <div class="summary-grid">
        <div class="summary-card is-blue">
          <div class="summary-number">${counts.all}</div>
          <div class="summary-label">전체 매핑</div>
        </div>
        <div class="summary-card is-green">
          <div class="summary-number">${counts.stable}</div>
          <div class="summary-label">확정됨</div>
        </div>
        <div class="summary-card is-yellow">
          <div class="summary-number">${counts.pending}</div>
          <div class="summary-label">검토 중</div>
        </div>
        <div class="summary-card is-red">
          <div class="summary-number">${counts['needs-review']}</div>
          <div class="summary-label">검토 필요</div>
        </div>
      </div>

      <div class="filter-bar" id="fc-filter-bar">
        <button class="filter-chip active" data-filter="all">전체 (${counts.all})</button>
        <button class="filter-chip" data-filter="stable">확정됨 (${counts.stable})</button>
        <button class="filter-chip" data-filter="pending">검토 중 (${counts.pending})</button>
        <button class="filter-chip" data-filter="needs-review">검토 필요 (${counts['needs-review']})</button>
      </div>

      <div class="table-wrap">
        <table class="data-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>CSS 변수</th>
              <th>Figma 변수</th>
              <th>상태</th>
              <th>라이트 모드 값</th>
              <th>다크 모드 값</th>
              <th>설명</th>
            </tr>
          </thead>
          <tbody id="fc-tbody"></tbody>
        </table>
      </div>
    `;

    function renderRows(filter) {
      const tbody = document.getElementById('fc-tbody');
      const rows = allItems.filter(it => {
        if (filter === 'all') return true;
        return String(it.status || '').toLowerCase() === filter;
      });
      if (rows.length === 0) {
        tbody.innerHTML = `<tr><td colspan="7" class="empty-msg">해당 status 항목 없음</td></tr>`;
        return;
      }
      tbody.innerHTML = rows.map(it => {
        const figmaName = it.figmaVariable || it.figmaSource || '';
        const light = it.modes && it.modes.light;
        const dark = it.modes && it.modes.dark;
        const note = it.meaning || (Array.isArray(it.notes) ? it.notes.join(' · ') : it.notes || '');
        return `
          <tr>
            <td>${code(it.id)}</td>
            <td>${code(it.cssVariable)}</td>
            <td>${code(figmaName)}</td>
            <td><span class="badge ${statusBadge(it.status)}">${statusLabel(it.status)}</span></td>
            <td>${code(light)}</td>
            <td>${code(dark)}</td>
            <td class="notes-cell">${fb(note)}</td>
          </tr>
        `;
      }).join('');
    }

    document.querySelectorAll('#fc-filter-bar .filter-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        document.querySelectorAll('#fc-filter-bar .filter-chip').forEach(c => c.classList.toggle('active', c === chip));
        renderRows(chip.dataset.filter);
      });
    });

    renderRows('all');
  }

  /* ──────────────────────────────────────────────────────────
     탭 2 — Legacy → Canonical Map
     ────────────────────────────────────────────────────────── */
  async function renderLegacyTab() {
    const root = document.getElementById('legacy-content');
    const { data, error } = await loadJson('registry/tokens/legacy-token-map.json');
    if (error) { renderError(root, error); return; }

    const keys = ['foundationCandidates', 'mappings', 'needsReview', 'deprecatedAliases'];
    const allItems = [];
    keys.forEach(k => {
      const arr = data[k];
      if (Array.isArray(arr)) arr.forEach(it => allItems.push({ ...it, _sourceKey: k }));
    });

    const counts = { all: allItems.length };
    allItems.forEach(it => {
      const s = String(it.migrationStatus || 'unknown').toLowerCase();
      counts[s] = (counts[s] || 0) + 1;
    });

    const legacyDate = (data.meta && (data.meta.updatedAt || data.meta.generatedAt) || '').slice(0, 10);

    const filterStatuses = [
      { key: 'all', label: '전체' },
      { key: 'mapped', label: '연결됨' },
      { key: 'needs-review', label: '검토 필요' },
      { key: 'foundation-candidate', label: '기본 레이어 후보' },
      { key: 'no-candidate', label: '후보 없음' }
    ];

    const summaryEntries = Object.entries(counts).filter(([k]) => k !== 'all');

    root.innerHTML = `
      <div class="data-source-bar">
        <span>소스:</span>
        <code class="data-source-file">registry/tokens/legacy-token-map.json</code>
        ${legacyDate ? `<span class="data-date-badge">최종 업데이트: ${legacyDate}</span>` : ''}
      </div>
      <div class="summary-grid">
        <div class="summary-card is-blue">
          <div class="summary-number">${counts.all}</div>
          <div class="summary-label">전체 항목</div>
        </div>
        ${summaryEntries.map(([k, v]) => {
          const color = k === 'mapped' ? 'is-green'
                      : k === 'needs-review' ? 'is-red'
                      : k === 'foundation-candidate' ? 'is-yellow'
                      : k === 'no-candidate' ? '' : 'is-orange';
          return `
            <div class="summary-card ${color}">
              <div class="summary-number">${v}</div>
              <div class="summary-label">${statusLabel(k)}</div>
            </div>
          `;
        }).join('')}
      </div>

      <div class="filter-bar" id="legacy-filter-bar">
        ${filterStatuses.map((f, i) => {
          const c = f.key === 'all' ? counts.all : (counts[f.key] || 0);
          return `<button class="filter-chip ${i === 0 ? 'active' : ''}" data-filter="${f.key}">${f.label} (${c})</button>`;
        }).join('')}
      </div>

      <div class="table-wrap">
        <table class="data-table">
          <thead>
            <tr>
              <th>레거시 Figma 변수</th>
              <th>권장 레이어</th>
              <th>권장 그룹</th>
              <th>정식 CSS 변수</th>
              <th>전환 상태</th>
              <th>신뢰도</th>
            </tr>
          </thead>
          <tbody id="legacy-tbody"></tbody>
        </table>
      </div>
    `;

    function renderRows(filter) {
      const tbody = document.getElementById('legacy-tbody');
      const rows = allItems.filter(it => {
        if (filter === 'all') return true;
        return String(it.migrationStatus || '').toLowerCase() === filter;
      });
      if (rows.length === 0) {
        tbody.innerHTML = `<tr><td colspan="6" class="empty-msg">해당 status 항목 없음</td></tr>`;
        return;
      }
      tbody.innerHTML = rows.map(it => {
        const css = it.canonicalCssVariable || it.canonicalRegistryToken;
        const cssCell = (it.canonicalCssVariable && it.canonicalCssVariable !== '')
          ? code(it.canonicalCssVariable)
          : (it.canonicalRegistryToken && it.canonicalRegistryToken !== '')
            ? `<span style="font-size:12px;color:#6b7280">→ ${escapeHtml(it.canonicalRegistryToken)}</span>`
            : '<span class="muted">미결정</span>';
        return `
          <tr>
            <td>${code(it.legacyFigmaVariable)}</td>
            <td>${fb(it.suggestedLayer)}</td>
            <td>${fb(it.suggestedGroup)}</td>
            <td>${cssCell}</td>
            <td><span class="badge ${statusBadge(it.migrationStatus)}">${statusLabel(it.migrationStatus)}</span></td>
            <td><span class="badge ${statusBadge(it.canonicalConfidence)}">${statusLabel(it.canonicalConfidence)}</span></td>
          </tr>
        `;
      }).join('');
    }

    document.querySelectorAll('#legacy-filter-bar .filter-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        document.querySelectorAll('#legacy-filter-bar .filter-chip').forEach(c => c.classList.toggle('active', c === chip));
        renderRows(chip.dataset.filter);
      });
    });

    renderRows('all');
  }

  /* ──────────────────────────────────────────────────────────
     탭 3 — Alias & Deprecated
     ────────────────────────────────────────────────────────── */
  async function renderAliasTab() {
    const root = document.getElementById('alias-content');
    const [aliasRes, deprRes] = await Promise.all([
      loadJson('registry/tokens/token-aliases.json'),
      loadJson('registry/tokens/deprecated-tokens.json')
    ]);

    const parts = [];

    // 소스 파일 날짜 표시
    const aliasDate = (!aliasRes.error && aliasRes.data.meta && (aliasRes.data.meta.updatedAt || aliasRes.data.meta.createdAt) || '').slice(0, 10);
    const deprDate  = (!deprRes.error  && deprRes.data.meta  && (deprRes.data.meta.updatedAt  || deprRes.data.meta.createdAt)  || '').slice(0, 10);
    const aliasLatestDate = [aliasDate, deprDate].filter(Boolean).sort().pop() || '';
    parts.push(`
      <div class="data-source-bar">
        <span>소스:</span>
        <code class="data-source-file">registry/tokens/token-aliases.json</code>
        <code class="data-source-file">deprecated-tokens.json</code>
        ${aliasLatestDate ? `<span class="data-date-badge">최종 업데이트: ${aliasLatestDate}</span>` : ''}
      </div>
    `);

    // Section A: State Aliases (figmaStateMapping)
    if (aliasRes.error) {
      parts.push(`<h3 class="section-title">State Aliases</h3>`);
      parts.push(`<div class="registry-error-box">
        <div class="registry-error-title">⚠ Registry 로드 실패</div>
        <div class="registry-error-msg">${escapeHtml(aliasRes.error)}</div>
      </div>`);
    } else {
      const stateMap = aliasRes.data.figmaStateMapping || [];
      parts.push(`<h3 class="section-title">상태 이름 대응표 (${stateMap.length})</h3>
        <p style="font-size:12px;color:#6b7280;margin:-4px 0 12px">Figma의 상태 이름과 코드에서 쓰는 상태 이름이 다를 때의 대응 규칙입니다.</p>`);
      if (stateMap.length === 0) {
        parts.push('<div class="empty-msg">정의된 상태 대응 없음</div>');
      } else {
        parts.push(`
          <div class="table-wrap">
            <table class="data-table">
              <thead>
                <tr>
                  <th>Figma 상태 이름</th>
                  <th>→</th>
                  <th>코드 상태 이름</th>
                  <th>적용 범위</th>
                  <th>토큰 변화</th>
                  <th>설명</th>
                </tr>
              </thead>
              <tbody>
                ${stateMap.map(s => `
                  <tr>
                    <td>${code(s.figmaState)}</td>
                    <td style="color:#9ca3af">→</td>
                    <td>${code(s.codeState)}</td>
                    <td>${fb(s.scope)}</td>
                    <td><span class="badge badge-gray">${fb(s.tokenBehavior)}</span></td>
                    <td class="notes-cell">${fb(s.description)}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        `);
      }

      // Section B: Token Aliases
      const tokenAliases = aliasRes.data.tokenAliases || [];
      parts.push(`<h3 class="section-title">토큰 별칭 (${tokenAliases.length})</h3>
        <p style="font-size:12px;color:#6b7280;margin:-4px 0 12px">별칭 변수는 실제로 존재하지 않고, 정식 변수를 가리키는 다른 이름입니다.</p>`);
      if (tokenAliases.length === 0) {
        parts.push('<div class="empty-msg">정의된 토큰 별칭 없음</div>');
      } else {
        parts.push(`
          <div class="table-wrap">
            <table class="data-table">
              <thead>
                <tr>
                  <th>별칭 변수</th>
                  <th>정식 변수</th>
                  <th>이유</th>
                  <th>상태</th>
                </tr>
              </thead>
              <tbody>
                ${tokenAliases.map(a => `
                  <tr>
                    <td>${code(a.alias)}</td>
                    <td>${code(a.canonical)}</td>
                    <td class="notes-cell">${fb(a.reason)}</td>
                    <td><span class="badge ${statusBadge(a.status)}">${statusLabel(a.status)}</span></td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        `);
      }
    }

    // Section C: Deprecated Tokens
    if (deprRes.error) {
      parts.push(`<h3 class="section-title">사용 중단된 토큰</h3>`);
      parts.push(`<div class="registry-error-box">
        <div class="registry-error-title">⚠ Registry 로드 실패</div>
        <div class="registry-error-msg">${escapeHtml(deprRes.error)}</div>
      </div>`);
    } else {
      const dep = deprRes.data.deprecatedTokens || [];
      parts.push(`<h3 class="section-title">사용 중단된 토큰 (${dep.length})</h3>
        <p style="font-size:12px;color:#6b7280;margin:-4px 0 12px">더 이상 사용하지 않거나 다른 변수로 교체된 토큰 목록입니다.</p>`);
      if (dep.length === 0) {
        parts.push('<div class="empty-msg">사용 중단된 토큰 없음</div>');
      } else {
        parts.push(`
          <div class="table-wrap">
            <table class="data-table">
              <thead>
                <tr>
                  <th>CSS 변수</th>
                  <th>대체 변수</th>
                  <th>이유</th>
                  <th>상태</th>
                </tr>
              </thead>
              <tbody>
                ${dep.map(d => {
                  const statusKey = String(d.status || '').toLowerCase();
                  const cls = statusKey === 'removed' ? 'badge-red'
                            : statusKey === 'deprecated' ? 'badge-orange'
                            : statusKey === 'relocated' ? 'badge-blue'
                            : 'badge-gray';
                  return `
                    <tr>
                      <td>${code(d.cssVariable)}</td>
                      <td>${d.replacedBy ? code(d.replacedBy) : '<span class="muted">없음</span>'}</td>
                      <td class="notes-cell">${fb(d.reason)}</td>
                      <td><span class="badge ${cls}">${statusLabel(d.status)}</span></td>
                    </tr>
                  `;
                }).join('')}
              </tbody>
            </table>
          </div>
        `);
      }
    }

    root.innerHTML = parts.join('');
  }

  /* ──────────────────────────────────────────────────────────
     초기 렌더링
     ────────────────────────────────────────────────────────── */
  document.addEventListener('DOMContentLoaded', () => {
    renderFigmaCssTab();
    renderLegacyTab();
    renderAliasTab();
  });
</script>
<script src="../assets/js/main.js"></script>
</body>
</html>
